name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Validate assets
        run: |
          echo "Validating image assets..."
          test -d assets/infografias || (echo "Missing assets/infografias" && exit 1)
          test -d assets/perfiles || (echo "Missing assets/perfiles" && exit 1)
          test -d assets/curvas || (echo "Missing assets/curvas" && exit 1)
          test -d assets/logos || (echo "Missing assets/logos" && exit 1)
          echo "Asset directories OK"
          
          echo "Checking for broken image references..."
          grep -oP 'src="assets/[^"]+"' index.html | sed 's/src="//;s/"$//' | while read src; do
            if [ ! -f "$src" ]; then
              echo "WARNING: Missing file referenced in HTML: $src"
            fi
          done
          echo "Validation complete"
        shell: bash

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
